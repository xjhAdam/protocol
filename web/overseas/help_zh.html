<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How to Use App Lock Guard</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
line-height:1.7;
padding:16px;
margin:0;
color:#333;
background:#fafafa;
}

h1{
text-align:center;
font-size:22px;
margin-bottom:10px;
}

.step{
background:white;
padding:16px;
margin-top:16px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.step h2{
font-size:18px;
margin-top:0;
color:#3F51B5;
}

.step img{
width:30%;
margin-top:10px;
border-radius:6px;
}

.tip{
background:#f5f7ff;
padding:10px;
border-left:4px solid #3F51B5;
margin-top:10px;
font-size:14px;
}

</style>

</head>

<body>

<h1>如何使用应用守护锁</h1>

<div class="step">

<h2>步骤一：设置锁屏密码</h2>

<p>
首次打开应用时，系统会提示您创建密码或手势密码。此密码将用于解锁受保护的应用。
</p>

<img src="images/step1.png" alt="Step 1 Screenshot">
<img src="images/step1_2.png" alt="Step 1 Screenshot">

<div class="tip">
提示：选择一个自己容易记住但别人不容易猜到的密码或手势。
</div>

</div>

<div class="step">

<h2>步骤二：授予所需权限</h2>

<p>
为确保应用锁正常工作，请授予必要的权限，例如：应用数据访问权限，浮框权限和忽略电池优化等。
</p>

<img src="images/step2.png" alt="Step 2 Screenshot">
<img src="images/step2_2.png" alt="Step 2 Screenshot">
<img src="images/step2_3.png" alt="Step 2 Screenshot">
<img src="images/step2_4.png" alt="Step 2 Screenshot">
<img src="images/step2_5.png" alt="Step 2 Screenshot">

</div>

<div class="step">

<h2>步骤三：选择要锁定的应用</h2>

<p>
打开应用列表，选择要保护的应用。选择后，这些应用在打开前需要输入密码或手势密码。
</p>

<img src="images/step3.png" alt="Step 3 Screenshot">

</div>

<div class="step">

<h2>步骤四：享受安全的应用保护</h2>

<p>
设置完成后，您选择的应用程序将受到保护。任何人试图打开这些应用程序时，都必须输入正确的密码或手势密码。
</p>

<img src="images/step4.png" alt="Step 4 Screenshot">

<div class="tip">
您可随时在设置页面更改密码。
</div>

</div>

</body>
</html>
